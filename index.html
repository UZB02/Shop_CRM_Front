<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <title>Sirius POS - Savdo Biznesingizni Professional Avtomatlashtiring</title>
</head>

<body>
  <script>
    // Apply theme before Vue mounts to prevent flash of wrong theme
    ; (function () {
      var saved = localStorage.getItem('theme')
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.classList.add('dark')
      }
    })()
  </script>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
