<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <title>Sirius POS - Savdo Biznesingizni Professional Avtomatlashtiring</title>
</head>

<body>
  <script>
    // Apply theme before Vue mounts to prevent flash of wrong theme
    ; (function () {
      var saved = localStorage.getItem('theme')
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.classList.add('dark')
      }
    })();

    // Global loading bar logic
    window._loaderCount = 0;
    window.startLoader = function () {
      window._loaderCount++;
      const bar = document.getElementById('global-loader-bar');
      const overlay = document.getElementById('global-initial-overlay');
      if (bar) {
        bar.style.width = '30%';
        bar.style.opacity = '1';
        setTimeout(() => { if (bar.style.width === '30%') bar.style.width = '75%'; }, 300);
      }
    };
    window.stopLoader = function () {
      window._loaderCount = Math.max(0, window._loaderCount - 1);
      if (window._loaderCount > 0) return;

      const bar = document.getElementById('global-loader-bar');
      const overlay = document.getElementById('global-initial-overlay');
      if (bar) {
        bar.style.width = '100%';
        setTimeout(() => {
          bar.style.opacity = '0';
          if (overlay) {
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 500);
          }
          setTimeout(() => { bar.style.width = '0%'; }, 300);
        }, 200);
      }
    };
  </script>

  <!-- Initial Page Loader (Logo Pulse) -->
  <div id="global-initial-overlay"
    style="position: fixed; inset: 0; background: #020617; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; font-family: 'Outfit', sans-serif;">
    <div style="position: relative;">
      <!-- Pulsing Rings -->
      <div class="loader-ring"
        style="position: absolute; inset: -20px; border: 2px solid #10b981; border-radius: 24px; opacity: 0; animation: pulse-ring 2s infinite;">
      </div>
      <div class="loader-ring"
        style="position: absolute; inset: -40px; border: 2px solid #10b981; border-radius: 30px; opacity: 0; animation: pulse-ring 2s infinite 0.5s;">
      </div>

      <!-- Logo Square -->
      <div
        style="width: 80px; height: 80px; background: #10b981; border-radius: 20px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 2; box-shadow: 0 0 40px rgba(16, 185, 129, 0.4); animation: logo-bounce 2s infinite ease-in-out;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"
            fill="white" />
        </svg>
      </div>
    </div>

    <div style="margin-top: 40px; text-align: center;">
      <h2 style="color: white; font-weight: 900; letter-spacing: 2px; margin: 0; font-size: 20px;">SIRIUS <span
          style="color: #10b981;">POS</span></h2>
      <p
        style="color: #64748b; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; margin-top: 10px; animation: text-fade 1.5s infinite;">
        Yuklanmoqda...</p>
    </div>

    <style>
      @keyframes pulse-ring {
        0% {
          transform: scale(0.8);
          opacity: 0.5;
        }

        100% {
          transform: scale(1.3);
          opacity: 0;
        }
      }

      @keyframes logo-bounce {

        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-10px);
        }
      }

      @keyframes text-fade {

        0%,
        100% {
          opacity: 0.4;
        }

        50% {
          opacity: 1;
        }
      }
    </style>
  </div>

  <!-- Top Progress Bar -->
  <div id="global-loader"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 3px; z-index: 10001; pointer-events: none;">
    <div id="global-loader-bar"
      style="width: 0%; height: 100%; background: linear-gradient(90deg, #10b981, #34d399, #10b981); background-size: 200% 100%; animation: shimmer 2s infinite linear; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease; opacity: 0; box-shadow: 0 0 15px rgba(16, 185, 129, 0.6);">
    </div>
  </div>

  <style>
    @keyframes shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }
  </style>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
