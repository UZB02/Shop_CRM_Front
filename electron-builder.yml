appId: uz.siriuspos.desktop
productName: Sirius POS
directories:
  output: release
files:
  - dist-electron-renderer/**/*
  - electron/**/*
  - package.json
# pdf-to-printer ichidagi SumatraPDF.exe asar ichida ishga tushmaydi —
# uni asardan tashqariga chiqaramiz.
asarUnpack:
  - node_modules/pdf-to-printer/**
win:
  target: nsis
  icon: build/icon.ico
nsis:
  # Telegram/Chrome uslubi: jim o'rnatadi, wizard'siz, o'zi qayta ochiladi
  oneClick: true
  perMachine: false # har foydalanuvchi uchun (%LOCALAPPDATA%) — admin/UAC kerak emas
publish:
  - provider: github
    owner: UZB02
    repo: Shop_CRM_Front # V1 desktop feed (V2 alohida feed ishlatadi)
    releaseType: release # darhol nashr (draft emas) — auto-update shu zahoti ishlaydi
